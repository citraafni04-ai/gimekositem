  <script>
// State
let scores = [0, 0, 0];
let currentView = 0;

// NAVIGATION
const views = ['view-home','view-materi','view-level1','view-level2','view-level3','view-hasil'];

function goTo(idx) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(views[idx]).classList.add('active');
    currentView = idx;
    updateProgress(idx);
    window.scrollTo(0, 0);

    const pb = document.getElementById('progress-bar');
    pb.classList.toggle('hidden', idx === 0);

    if (idx === 1) showTab(0);
    if (idx === 2) initLevel1();
    if (idx === 3) initLevel2();
    if (idx === 4) initLevel3();
    if (idx === 5) showResults();
}

function updateProgress(idx) {
    document.querySelectorAll('.progress-step').forEach(s => {
        const step = parseInt(s.dataset.step);
        s.classList.remove('completed','current');
        if (step < idx) s.classList.add('completed');
        else if (step === idx) s.classList.add('current');
    });
}

// TABS
function showTab(i) {
    document.querySelectorAll('.tab-panel').forEach((p, idx) => p.classList.toggle('hidden', idx !== i));
    document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
}

// LEVEL 1: Drag & Drop
const l1Data = [
    { name: '🌳 Pohon', cat: 'biotik' },
    { name: '☀️ Matahari', cat: 'abiotik' },
    { name: '🐰 Kelinci', cat: 'biotik' },
    { name: '💧 Air', cat: 'abiotik' },
    { name: '🌿 Rumput', cat: 'biotik' },
    { name: '🪨 Tanah', cat: 'abiotik' },
    { name: '🦅 Elang', cat: 'biotik' },
    { name: '💨 Udara', cat: 'abiotik' }
];

function initLevel1() {
    scores[0] = 0;
    document.getElementById('l1-score').textContent = 'Skor: 0 / 8';
    document.getElementById('l1-complete').classList.add('hidden');
    document.getElementById('zone-biotik-items').innerHTML = '';
    document.getElementById('zone-abiotik-items').innerHTML = '';

    const container = document.getElementById('l1-items');
    container.innerHTML = '';
    const shuffled = [...l1Data].sort(() => Math.random() - 0.5);

    shuffled.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'drag-item px-5 py-3 rounded-xl font-bold text-white shadow-md text-sm';
        el.style.background = item.cat === 'biotik' ? '#52b788' : '#f8961e';
        el.textContent = item.name;
        el.dataset.cat = item.cat;
        el.dataset.idx = i;
        setupDrag(el);
        container.appendChild(el);
    });

    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            const idx = e.dataTransfer.getData('text/plain');
            const dragEl = document.querySelector(`.drag-item[data-idx="${idx}"]`);
            if (!dragEl) return;
            handleDrop(dragEl, zone);
        });
    });
}

function setupDrag(el) {
    el.draggable = true;
    el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', el.dataset.idx);
        el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));

    // Touch support
    let startX, startY, clone;
    el.addEventListener('pointerdown', e => {
        if (e.pointerType === 'mouse') return;
        e.preventDefault();
        startX = e.clientX; startY = e.clientY;
        clone = el.cloneNode(true);
        clone.style.position = 'fixed';
        clone.style.zIndex = '9999';
        clone.style.pointerEvents = 'none';
        clone.style.width = el.offsetWidth + 'px';
        clone.style.left = (e.clientX - el.offsetWidth/2) + 'px';
        clone.style.top = (e.clientY - 20) + 'px';
        document.body.appendChild(clone);
        el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', e => {
        if (!clone) return;
        clone.style.left = (e.clientX - el.offsetWidth/2) + 'px';
        clone.style.top = (e.clientY - 20) + 'px';
    });
    el.addEventListener('pointerup', e => {
        if (!clone) return;
        clone.remove(); clone = null;
        const target = document.elementFromPoint(e.clientX, e.clientY);
        const zone = target?.closest('.drop-zone');
        if (zone) handleDrop(el, zone);
    });
}

function handleDrop(dragEl, zone) {
    const correct = dragEl.dataset.cat === zone.dataset.category;
    if (correct) {
        scores[0]++;
        const pill = document.createElement('div');
        pill.className = 'px-3 py-1 rounded-lg text-white text-sm font-bold animate-pulse';
        pill.style.background = dragEl.dataset.cat === 'biotik' ? '#2d6a4f' : '#e76f51';
        pill.textContent = dragEl.textContent;
        zone.querySelector('[id$="-items"]').appendChild(pill);
        dragEl.remove();
        document.getElementById('l1-score').textContent = `Skor: ${scores[0]} / 8`;
        if (scores[0] === 8) {
            document.getElementById('l1-complete').classList.remove('hidden');
        }
    } else {
        dragEl.classList.add('animate-shake');
        setTimeout(() => dragEl.classList.remove('animate-shake'), 400);
    }
}

// LEVEL 2: Matching
const l2Pairs = [
    { term: 'Produsen', def: 'Makhluk hidup yang menghasilkan makanan sendiri' },
    { term: 'Konsumen', def: 'Makhluk hidup yang memakan makhluk lain' },
    { term: 'Dekomposer', def: 'Pengurai sisa-sisa makhluk hidup' },
    { term: 'Herbivora', def: 'Hewan pemakan tumbuhan' },
    { term: 'Karnivora', def: 'Hewan pemakan daging' },
    { term: 'Omnivora', def: 'Hewan pemakan segala' }
];
const matchColors = ['#2d6a4f','#f8961e','#e76f51','#3a86ff','#8338ec','#ff006e'];
let selectedTerm = null;

function initLevel2() {
    scores[1] = 0;
    selectedTerm = null;
    document.getElementById('l2-score').textContent = 'Skor: 0 / 6';
    document.getElementById('l2-complete').classList.add('hidden');

    const termsC = document.getElementById('l2-terms');
    const defsC = document.getElementById('l2-defs');
    termsC.innerHTML = ''; defsC.innerHTML = '';

    const shuffledDefs = [...l2Pairs].sort(() => Math.random() - 0.5);

    l2Pairs.forEach((p, i) => {
        const t = document.createElement('div');
        t.className = 'match-term bg-white border-2 border-green-300 rounded-xl px-4 py-3 font-bold text-center';
        t.style.color = '#1b4332';
        t.textContent = p.term;
        t.dataset.idx = i;
        t.addEventListener('click', () => selectTerm(t));
        termsC.appendChild(t);
    });

    shuffledDefs.forEach(p => {
        const d = document.createElement('div');
        d.className = 'match-def bg-white border-2 border-amber-300 rounded-xl px-4 py-3 text-sm text-center';
        d.style.color = '#1b4332';
        d.textContent = p.def;
        d.dataset.term = p.term;
        d.addEventListener('click', () => selectDef(d));
        defsC.appendChild(d);
    });
}

function selectTerm(el) {
    if (el.classList.contains('matched')) return;
    document.querySelectorAll('.match-term').forEach(t => t.classList.remove('selected'));
    el.classList.add('selected');
    selectedTerm = el;
}

function selectDef(el) {
    if (!selectedTerm || el.classList.contains('matched')) return;
    const termIdx = parseInt(selectedTerm.dataset.idx);
    const correct = l2Pairs[termIdx].term === el.dataset.term;

    if (correct) {
        scores[1]++;
        const color = matchColors[termIdx];
        selectedTerm.style.background = color;
        selectedTerm.style.color = 'white';
        selectedTerm.style.borderColor = color;
        selectedTerm.classList.add('matched');
        selectedTerm.classList.remove('selected');
        el.style.background = color;
        el.style.color = 'white';
        el.style.borderColor = color;
        el.classList.add('matched');
        document.getElementById('l2-score').textContent = `Skor: ${scores[1]} / 6`;
        selectedTerm = null;
        if (scores[1] === 6) document.getElementById('l2-complete').classList.remove('hidden');
    } else {
        el.style.background = '#f8d7da';
        setTimeout(() => { el.style.background = 'white'; }, 400);
    }
}

// LEVEL 3: Quiz
const quizData = [
    { q: 'Apa yang dimaksud dengan ekosistem?', opts: ['Kumpulan hewan saja', 'Hubungan timbal balik antara makhluk hidup dengan lingkungannya', 'Tempat hidup tumbuhan', 'Kumpulan tumbuhan saja'], ans: 1, explain: 'Ekosistem adalah hubungan timbal balik antara makhluk hidup (biotik) dengan lingkungannya (abiotik).' },
    { q: 'Manakah yang termasuk komponen abiotik?', opts: ['Pohon', 'Jamur', 'Air', 'Ikan'], ans: 2, explain: 'Air adalah komponen abiotik (tak hidup). Pohon, jamur, dan ikan adalah komponen biotik (hidup).' },
    { q: 'Dalam rantai makanan, tumbuhan hijau berperan sebagai?', opts: ['Konsumen I', 'Dekomposer', 'Produsen', 'Konsumen II'], ans: 2, explain: 'Tumbuhan hijau adalah produsen karena dapat membuat makanan sendiri melalui fotosintesis.' },
    { q: 'Apa yang terjadi jika produsen dalam ekosistem punah?', opts: ['Tidak terjadi apa-apa', 'Konsumen bertambah', 'Seluruh rantai makanan terganggu', 'Dekomposer bertambah'], ans: 2, explain: 'Jika produsen punah, seluruh rantai makanan akan terganggu karena tidak ada sumber makanan dasar.' },
    { q: 'Contoh ekosistem air tawar adalah?', opts: ['Laut', 'Danau', 'Terumbu karang', 'Pantai'], ans: 1, explain: 'Danau adalah contoh ekosistem air tawar. Laut, terumbu karang, dan pantai termasuk ekosistem air asin.' },
    { q: 'Hewan yang memakan tumbuhan dan daging disebut?', opts: ['Herbivora', 'Karnivora', 'Omnivora', 'Insektivora'], ans: 2, explain: 'Omnivora adalah hewan pemakan segala (tumbuhan dan daging).' },
    { q: 'Apa peran dekomposer dalam ekosistem?', opts: ['Memakan hewan lain', 'Menghasilkan oksigen', 'Mengurai sisa makhluk hidup menjadi zat hara', 'Memakan tumbuhan'], ans: 2, explain: 'Dekomposer mengurai sisa-sisa makhluk hidup menjadi zat hara yang dapat digunakan kembali oleh produsen.' },
    { q: 'Manakah urutan rantai makanan yang benar?', opts: ['Elang → Ular → Tikus → Padi', 'Padi → Tikus → Ular → Elang', 'Tikus → Padi → Elang → Ular', 'Ular → Elang → Padi → Tikus'], ans: 1, explain: 'Urutan yang benar: Padi (produsen) → Tikus (konsumen I) → Ular (konsumen II) → Elang (konsumen III).' }
];
let quizIdx = 0;

function initLevel3() {
    scores[2] = 0; quizIdx = 0;
    document.getElementById('l3-score').textContent = 'Skor: 0 / 8';
    document.getElementById('l3-complete').classList.add('hidden');
    showQuestion();
}

function showQuestion() {
    if (quizIdx >= quizData.length) {
        document.getElementById('l3-question-area').innerHTML = '<p class="text-center text-lg font-bold" style="color:#2d6a4f">Semua soal selesai! 🎉</p>';
        document.getElementById('l3-complete').classList.remove('hidden');
        return;
    }
    const q = quizData[quizIdx];
    document.getElementById('l3-counter').textContent = `Soal ${quizIdx + 1} dari 8`;

    const labels = ['A', 'B', 'C', 'D'];
    let html = `<p class="font-bold text-lg mb-5" style="color:#1b4332">${q.q}</p><div class="space-y-3" id="quiz-opts">`;
    q.opts.forEach((o, i) => {
        html += `<div class="quiz-option border-2 border-gray-200 rounded-xl px-5 py-3 font-medium" style="color:#1b4332" data-oi="${i}" onclick="answerQuiz(${i})"><span class="inline-block w-8 h-8 rounded-full bg-gray-100 text-center leading-8 font-bold mr-3 text-sm">${labels[i]}</span>${o}</div>`;
    });
    html += '</div><div id="quiz-feedback" class="mt-4 hidden"></div><div id="quiz-next" class="mt-4 hidden text-center"><button class="px-6 py-2 rounded-xl font-bold text-white" style="background:#40916c" onclick="nextQuestion()">Selanjutnya →</button></div>';
    document.getElementById('l3-question-area').innerHTML = html;
}

function answerQuiz(i) {
    const q = quizData[quizIdx];
    const opts = document.querySelectorAll('.quiz-option');
    opts.forEach(o => { o.classList.add('disabled'); });
    if (i === q.ans) {
        scores[2]++;
        opts[i].classList.add('correct');
    } else {
        opts[i].classList.add('incorrect');
        opts[q.ans].classList.add('correct');
    }
    document.getElementById('l3-score').textContent = `Skor: ${scores[2]} / 8`;
    const fb = document.getElementById('quiz-feedback');
    fb.classList.remove('hidden');
    fb.innerHTML = `<div class="bg-green-50 border border-green-200 rounded-xl p-3 text-sm" style="color:#2d6a4f"><strong>Penjelasan:</strong> ${q.explain}</div>`;
    document.getElementById('quiz-next').classList.remove('hidden');
}

function nextQuestion() {
    quizIdx++;
    showQuestion();
}

// RESULTS
function showResults() {
    document.getElementById('sc1').textContent = `${scores[0]}/8`;
    document.getElementById('sc2').textContent = `${scores[1]}/6`;
    document.getElementById('sc3').textContent = `${scores[2]}/8`;
    document.getElementById('stars1').textContent = getStars(scores[0], 8);
    document.getElementById('stars2').textContent = getStars(scores[1], 6);
    document.getElementById('stars3').textContent = getStars(scores[2], 8);

    const total = scores[0] + scores[1] + scores[2];
    document.getElementById('total-score').textContent = `Total Skor: ${total} / 22`;

    let tier, emoji;
    if (total >= 20) { tier = 'Luar Biasa!'; emoji = '🌟'; }
    else if (total >= 15) { tier = 'Hebat!'; emoji = '⭐'; }
    else if (total >= 10) { tier = 'Bagus!'; emoji = '👍'; }
    else { tier = 'Terus Belajar!'; emoji = '💪'; }

    document.getElementById('tier-label').textContent = `${emoji} ${tier}`;
    document.getElementById('cert-score-display').textContent = `Skor: ${total} / 22`;
    document.getElementById('cert-tier').textContent = `${emoji} ${tier}`;

    launchConfetti();
}

function getStars(score, max) {
    const ratio = score / max;
    if (ratio >= 0.9) return '★★★';
    if (ratio >= 0.6) return '★★☆';
    if (ratio >= 0.3) return '★☆☆';
    return '☆☆☆';
}

function launchConfetti() {
    const colors = ['#f9c74f','#f8961e','#52b788','#3a86ff','#ff006e','#8338ec'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = Math.random() * 1.5 + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
    }
}

function resetGame() {
    scores = [0, 0, 0];
    goTo(0);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
});
